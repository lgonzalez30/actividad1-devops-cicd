apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  namespace: devops-lab
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service.devops-lab.svc.cluster.local:9090
        isDefault: true
        editable: true
