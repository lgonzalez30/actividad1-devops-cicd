apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-config
  namespace: devops-lab
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  app-dashboard.json: |
    {
      "title": "DevOps Lab App",
      "description": "Dashboard basico para la app del laboratorio",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Requests Total",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum by (route) (http_requests_total{job=\"devops-lab-app\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Request Duration p95",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"devops-lab-app\"}[1m])))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Resident Memory",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=\"devops-lab-app\"}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Process CPU Time",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "targets": [
            {
              "expr": "process_cpu_seconds_total{job=\"devops-lab-app\"}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Application Up",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "targets": [
            {
              "expr": "up{job=\"devops-lab-app\"}",
              "refId": "A"
            }
          ]
        }
      ]
    }
