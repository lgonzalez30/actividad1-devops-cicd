services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-devops-lab
    user: "0:0"
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"

volumes:
  jenkins_home:
